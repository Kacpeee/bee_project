services:

  # --- Baza danych: PostGIS + pgSTAC ---
  db:
    image: ghcr.io/stac-utils/pgstac:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  # --- STAC API (stac-fastapi-pgstac) ---
  stac-api:
    build: ./stac-api
    ports:
      - "8088:8080"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_DBNAME: ${POSTGRES_DB}
      POSTGRES_HOST_READER: db
      POSTGRES_HOST_WRITER: db
      POSTGRES_PORT: 5432
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  # --- Serwer kafli rastrowych (COG) ---
  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    ports:
      - "8082:80"
    environment:
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: YES
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: .tif,.TIF,.tiff,.vrt
      TITILER_API_CORS_ORIGIN: "*"
      GDAL_CACHEMAX: "512"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "5000000"
    volumes:
      - ./data:/data:ro

  # --- Serwer kafli wektorowych (MVT) ---
  tipg:
    build: ./tipg
    ports:
      - "8083:8083"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASS: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DBNAME: ${POSTGRES_DB}
      TIPG_DB_SCHEMAS: '["app"]'
    depends_on:
      db:
        condition: service_healthy

  # --- Backend FastAPI ---
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./backend/src:/app/src
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  # --- Frontend Streamlit ---
  frontend:
    build: ./frontend
    ports:
      - "8502:8501"
    environment:
      STAC_API_URL: http://stac-api:8080
      BACKEND_URL: http://backend:8000
      PUBLIC_TITILER_URL: http://localhost:8082
      PUBLIC_TIPG_URL: http://localhost:8083
      PUBLIC_BACKEND_URL: http://localhost:8000
      BOUNDARY_GEOJSON: /data/lubelskie_boundary.geojson
    volumes:
      - ./frontend/src:/app/src
      - ./data:/data
    depends_on:
      - backend
      - stac-api
      - titiler
      - tipg

  # --- Jednorazowe zaladowanie danych (uruchamia sie raz przy starcie) ---
  db-init:
    build: ./scripts
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
